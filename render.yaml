services:
  - type: web
    name: askmi-backend
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
